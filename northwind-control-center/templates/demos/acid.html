{% extends "base.html" %}
{% block title %}ACID Bank Transfer Demo{% endblock %}

{% block content %}
<style>
.account-card { transition: background-color 0.3s; }
.account-card.flash-green { background-color: #1a4731 !important; }
.account-card.flash-red { background-color: #5a1a1a !important; }
</style>

<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('demos.index') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0 fw-bold">⚡ ACID Bank Transfer Demo</h2>
</div>

<div class="row g-4">

  <!-- Left Column -->
  <div class="col-md-5">
    <h5 class="fw-semibold mb-3">Account Balances</h5>
    <div class="row g-2 mb-4" id="accounts-grid">
      <div class="col-4">
        <div class="card account-card text-center p-2" id="card-1">
          <div class="small text-muted">Alice</div>
          <div class="fs-4 fw-bold" id="bal-1">—</div>
        </div>
      </div>
      <div class="col-4">
        <div class="card account-card text-center p-2" id="card-2">
          <div class="small text-muted">Bob</div>
          <div class="fs-4 fw-bold" id="bal-2">—</div>
        </div>
      </div>
      <div class="col-4">
        <div class="card account-card text-center p-2" id="card-3">
          <div class="small text-muted">Carol</div>
          <div class="fs-4 fw-bold" id="bal-3">—</div>
        </div>
      </div>
    </div>

    <h5 class="fw-semibold mb-3">Transfer Parameters</h5>
    <form id="transfer-form">
      <div class="mb-3">
        <label class="form-label">Connection</label>
        <select class="form-select" name="conn_id" id="conn-select">
          {% for c in sqlite_conns %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% else %}
          <option value="" disabled>No SQLite connections found</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">From Account</label>
        <select class="form-select" name="from_id">
          <option value="1">1 — Alice</option>
          <option value="2">2 — Bob</option>
          <option value="3">3 — Carol</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">To Account</label>
        <select class="form-select" name="to_id">
          <option value="2">2 — Bob</option>
          <option value="1">1 — Alice</option>
          <option value="3">3 — Carol</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" class="form-control" name="amount" value="100" min="1" step="1">
      </div>
      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" name="force_fail" id="force-fail-chk">
        <label class="form-check-label" for="force-fail-chk">
          Force failure (simulate crash)
        </label>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="run-btn">
        <i class="bi bi-play-fill me-1"></i> Run Transfer
      </button>
    </form>
  </div>

  <!-- Right Column -->
  <div class="col-md-7">
    <h5 class="fw-semibold mb-3">Execution Log</h5>
    <div id="step-log"
         class="bg-dark border rounded p-3 font-monospace small mb-3"
         style="min-height:200px; max-height:350px; overflow-y:auto;">
      <span class="text-muted">Run a transfer to see step-by-step execution...</span>
    </div>

    <div id="result-banner" class="alert d-none" role="alert"></div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/demos/acid.js') }}"></script>
{% endblock %}
