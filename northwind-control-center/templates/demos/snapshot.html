{% extends "base.html" %}
{% block title %}Snapshot Replication Demo{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('demos.index') }}" class="btn btn-sm btn-outline-secondary me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0 fw-bold">🔄 Snapshot Replication Demo</h2>
</div>

<p class="text-muted mb-3">
  Click <strong>Push Snapshot</strong> to watch the snapshot propagate from the central HQ hub to all branch nodes.
</p>

<div class="mb-3 d-flex gap-2">
  <button class="btn btn-success" id="push-btn">
    <i class="bi bi-broadcast me-1"></i> Push Snapshot
  </button>
  <button class="btn btn-outline-secondary" id="reset-btn">
    <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
  </button>
</div>

<div id="cy" class="border rounded bg-dark" style="width:100%; height:600px;"></div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="{{ url_for('static', filename='js/demos/snapshot.js') }}"></script>
{% endblock %}
